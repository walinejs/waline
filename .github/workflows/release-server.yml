name: 'publish @waline/vercel'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/release-server.yml
      - packages/server/**

permissions:
  contents: read
  id-token: write

jobs:
  npm:
    runs-on: ubuntu-latest
    outputs:
      old-version: ${{ steps.get-version.outputs.old-version }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.17.0
          cache: pnpm

      - name: Install Dependencies
        run: pnpm ci

      - name: Get version
        id: get-version
        shell: bash
        run: |
          LOCAL_VERSION=$(node -p "require('./packages/server/package.json').version")
          REMOTE_VERSION=$(pnpm view @waline/vercel version 2>/dev/null || echo "none")

          echo "version=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "old-version=$REMOTE_VERSION" >> $GITHUB_OUTPUT

      - name: Publish
        run: pnpm publish -r --filter @waline/vercel --no-git-checks

  docker:
    needs: npm
    if: ${{ needs.npm.outputs.old-version != needs.npm.outputs.version || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push alpine
        uses: docker/build-push-action@v7
        with:
          file: ./packages/server/Dockerfile.alpine
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            lizheming/waline:alpine
            lizheming/waline:${{ needs.npm.outputs.version }}-alpine

      - name: Build and push debian
        uses: docker/build-push-action@v7
        with:
          file: ./packages/server/Dockerfile
          platforms: linux/amd64,linux/arm64/v8
          push: true
          tags: |
            lizheming/waline:latest
            lizheming/waline:${{ needs.npm.outputs.version }}
