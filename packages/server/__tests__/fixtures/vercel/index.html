<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Waline Client Preview</title>
    <link rel="stylesheet" href="/client/waline.css" />
    <style>
      body {
        box-sizing: border-box;
        max-width: 960px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 2rem;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
      }

      main {
        padding: 2rem;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 20px 45px rgb(15 23 42 / 8%);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Waline Client Preview</h1>
      <p>This page loads the PR build of <code>@waline/client</code> and connects it to <code>/api</code>.</p>
      <div id="waline"></div>
    </main>

    <script type="module">
      import { init } from '/client/waline.js';

      init({
        el: '#waline',
        serverURL: '/api',
      });
    </script>
  </body>
</html>
