packages:
  - docs
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  core-js-pure: true
  esbuild: true
  sqlite3: true
  better-sqlite3: true
  unrs-resolver: true

enableGlobalVirtualStore: true

overrides:
  # FIXME: vulnerable
  '@cloudbase/database>lodash.unset': ^4.18.0
  # FIXME: vulnerable
  '@cloudbase/node-sdk>axios': ^1.0.0
  # FIXME: https://github.com/next-theme/utils/issues/42
  '@next-theme/utils>js-yaml': ^5.0.0
  '@waline/api': workspace:*
  '@waline/client': workspace:*
  '@xmldom/xmldom': ^0.9.10
  # FIXME: vulnerable
  # 'apidoc>bootstrap': 5.3.8
  # FIXME: vulnerable
  'apidoc>esbuild-loader': ^4.4.3

patchedDependencies:
  apidoc: patches/apidoc.patch

packageExtensions:
  # FIXME: This is a bug in mathjax
  '@mathjax/mathjax-newcm-font':
    peerDependencies:
      '@mathjax/src': ^4.1.2

  # FIXME: This is a bug in mathjax
  '@mathjax/mathjax-tex-font':
    peerDependencies:
      '@mathjax/src': ^4.1.2

trustPolicy: no-downgrade

trustPolicyExclude:
  - tinyexec@1.2.2
  - semver@6.3.1
  - undici@5.29.0

# disable minimum release age to allow immediate releases
minimumReleaseAge: 0
